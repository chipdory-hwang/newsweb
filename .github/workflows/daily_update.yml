name: Daily News Scraper

on:
  schedule:
    - cron: '0 21 * * *'  # 한국 시간 매일 오전 6시
  workflow_dispatch:      # 수동 실행 버튼 활성화

# 핵심: 깃허브 액션에 저장소 쓰기 권한을 부여합니다 (에러 128 해결)
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install feedparser

      - name: Run news update script
        run: python update_news.py

      - name: Commit and Push changes
        run: |
          git config --global user.name "chipdory-bot"
          git config --global user.email "bot@github.com"
          git add index.html
          # 변경사항이 있을 때만 커밋 (없으면 스킵)
          git commit -m "Auto-update news: $(date)" || exit 0
          git push
