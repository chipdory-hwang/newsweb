name: Daily News Scraper

on:
  schedule:
    # 한국 시간 기준 매일 오전 6시 (UTC 21:00)
    - cron: '0 21 * * *'
  workflow_dispatch: # 수동 실행 버튼 활성화

permissions:
  contents: write # 깃허브 저장소에 파일을 쓸 수 있는 권한 허용

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # 본문 추출을 위해 필요한 라이브러리들입니다.
          pip install feedparser requests beautifulsoup4

      - name: Run news update script
        run: |
          python update_news.py

      - name: Commit and Push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add index.html
          # 변경사항이 있을 때만 커밋 (에러 방지)
          git diff --quiet && git diff --staged --quiet || (git commit -m "Daily news update: $(date +'%Y-%m-%d %H:%M')" && git push)
