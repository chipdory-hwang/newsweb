name: Daily News Scraper

on:
  schedule:
    - cron: '0 21 * * *'  # 한국 시간 매일 오전 6시 (UTC 21:00)
  workflow_dispatch:      # 수동으로도 실행할 수 있게 버튼 활성화

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install feedparser

      - name: Run news update script
        run: python update_news.py

      - name: Commit and Push changes
        run: |
          git config --global user.name "chipdory-bot"
          git config --global user.email "bot@github.com"
          git add index.html
          git commit -m "Auto-update news: $(date)" || exit 0
          git push
